services:
  - type: worker
    name: shadow-radar-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false

