name: Shadow Radar Runner

on:
  schedule:
    # Corre cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite activarlo manualmente

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Radar
        env:
          # Aquí conectamos los secretos de GitHub con las variables del bot
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          # El PYTHONPATH es para que encuentre la carpeta src
          PYTHONPATH: ${{ github.workspace }}/src
        run: python src/main.py

