name: Shadow Radar Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'  # Ejecución cada 30 minutos
  workflow_dispatch:

jobs:
  run-radar:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        # 🟢 CAMBIO: Instalamos groq en lugar de google-genai
        run: pip install discord.py httpx groq python-dotenv
      - name: Run
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          # 🟢 CAMBIO: Usamos el secreto de GROQ
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -u src/main.py

