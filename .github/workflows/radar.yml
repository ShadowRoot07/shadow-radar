name: Shadow Radar Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'  # Ejecución cada 30 minutos
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install discord.py httpx google-genai python-dotenv
      - name: Run
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -u src/main.py

