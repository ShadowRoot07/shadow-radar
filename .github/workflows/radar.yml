name: Shadow Radar Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */8 * * *'   # Ejecución cada 8 horas
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install discord.py httpx groq python-dotenv pytest pytest-asyncio

      - name: Run Tests
        if: github.event_name == 'push'
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          # 🟢 Solución al error: Pasamos una key falsa para el constructor de Groq
          GROQ_API_KEY: "gsk_test_key_placeholder"
        run: pytest

      - name: Run Bot
        # Solo corre el bot si los tests pasaron (en push) o si es schedule
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -u src/main.py

